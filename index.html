<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>퀴즈 v0.3.3</title>
  <link rel="stylesheet" href="style.css">

  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
</head>
<body>
  <div id="app">
    <div id="login-screen" class="screen active">
      <h1>퀴즈 시스템 접속</h1>
      <p>암호 키를 입력해주세요.</p>
      <input type="password" id="secret-key-input" placeholder="키 입력" style="width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ccc; border-radius: 4px;">
      <button id="login-btn">데이터 복호화 및 접속</button>
    </div> 

    <div id="start-screen" class="screen">
      <h1>퀴즈 풀이 시작</h1>
      <p>1. 단원을 선택하세요:</p>
      <div id="unit-selection"></div>
      <p>2. 추가 옵션:</p>
      <label>
        <input type="checkbox" id="by-book-cb"> 책 별로 묶어서 출제
      </label><br>
      <label>
        <input type="checkbox" id="shuffle-chapter-cb"> 챕터 섞기
      </label><br>
      <label>
        <input type="checkbox" id="immediate-feedback-cb"> 매 문제마다 정답/해설 보기
      </label>
      <label>
        <input type="checkbox" id="infinite-review-cb"> 틀린 문제 전부 맞을 때까지 무한 반복
      </label>
      <button id="start-btn">퀴즈 시작</button>
    </div>

    <div id="quiz-screen" class="screen">
      <div class="header" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
        <span id="progress-text">0/0</span>
        <button id="quit-btn" style="background-color: #6c757d; padding: 4px 10px; font-size: 12px; width: auto; margin-top: 0;">그만두기</button>
      </div>
      
      <h2 style="display: flex; gap: 8px;">
        <span id="question-no" style="color: #007bff; min-width: 60px;"></span>
        <span id="question-text">문제 텍스트</span>
      </h2>

      <div id="options-container"></div> 
      <div id="feedback-area" style="display: none;">
        <div id="feedback-content"></div>
        <button id="next-btn" class="danger-btn">다음 문제로 넘어가기(Enter)</button>
      </div>
    </div>

    <div id="result-screen" class="screen">
      <h1>풀이 결과</h1>
      <h2 id="score-text"></h2>
      <div id="wrong-answers-container"></div>
      <button id="restart-btn">처음으로 돌아가기</button>
    </div>
  </div>

  <script type="module" src="./script.js"></script>
</body>
</html>
